name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC - weekly mutation scan
  workflow_dispatch:         # manual trigger for weekly scan

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: test (${{ matrix.os }})
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all --all-targets -- -D warnings

      - name: test
        run: cargo test --all

      - name: snapshots (no pending reviews)
        run: |
          PENDING=$(find . -path ./target -prune -o -name "*.snap.new" -print \
            | grep ".snap.new" || true)
          if [ -n "$PENDING" ]; then
            echo "Unreviewed insta snapshots found:"
            echo "$PENDING"
            echo "Run 'cargo insta review' locally before pushing."
            exit 1
          fi

      - name: build release
        run: cargo build --release

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-latest-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-cov-

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-llvm-cov
        run: cargo binstall cargo-llvm-cov --no-confirm

      - name: Run coverage
        run: cargo llvm-cov --all 2>&1 | tee cov_output.txt

      - name: Post summary
        if: always()
        run: |
          {
            echo "## Coverage"
            echo '```'
            cat cov_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce >=80% line coverage
        run: cargo llvm-cov report --fail-under-lines 80

  mutation:
    name: mutation testing
    runs-on: ubuntu-latest
    # Only run on PRs -- scoped to changed files, so always relevant at merge time.
    if: github.event_name == 'pull_request'
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-latest-cargo-mutation-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-mutation-

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-mutants
        run: cargo binstall cargo-mutants --no-confirm

      - name: Find changed tankyu-core source files
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          FILES=$(git diff "origin/${BASE_REF}...HEAD" --name-only \
            -- 'crates/tankyu-core/src/**/*.rs' | grep -v '^$' || true)
          echo "Changed core files:"
          echo "${FILES:-(none)}"
          # Write as multiline output
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run mutation testing
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          FILE_ARGS=""
          while IFS= read -r f; do
            [ -n "$f" ] && FILE_ARGS="$FILE_ARGS --file $f"
          done <<< "$CHANGED_FILES"

          echo "Running: cargo mutants -p tankyu-core $FILE_ARGS"
          cargo mutants -p tankyu-core $FILE_ARGS 2>&1 | tee mutants_output.txt

          # Parse summary: "N mutants tested in Xs: M caught, T timeout, X missed, U unviable"
          SUMMARY=$(grep -E "[0-9]+ mutants tested" mutants_output.txt | tail -1)
          echo "Summary: $SUMMARY"

          CAUGHT=$(echo "$SUMMARY" | grep -oE '[0-9]+ caught' | grep -oE '[0-9]+' || echo 0)
          MISSED=$(echo "$SUMMARY" | grep -oE '[0-9]+ missed' | grep -oE '[0-9]+' || echo 0)
          TOTAL=$(( ${CAUGHT:-0} + ${MISSED:-0} ))

          if [ "$TOTAL" -eq 0 ]; then
            echo "No viable mutants -- skipping kill rate check."
            echo "## Mutation: no viable mutants" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          RATE=$(( CAUGHT * 100 / TOTAL ))
          echo ""
          echo "=== Kill rate: ${CAUGHT}/${TOTAL} = ${RATE}% ==="

          {
            echo "## Mutation Kill Rate: ${RATE}% (${CAUGHT}/${TOTAL} mutants killed)"
            if [ "$RATE" -lt 80 ]; then
              echo ":x: Below the 80% threshold -- add tests to kill surviving mutants."
            else
              echo ":white_check_mark: Meets the 80% threshold."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$RATE" -lt 80 ]; then
            echo "FAIL: Kill rate ${RATE}% is below the 80% threshold."
            exit 1
          fi

      - name: Skip message
        if: steps.changed.outputs.files == ''
        run: |
          echo "No tankyu-core source files changed -- mutation testing skipped."
          echo "## Mutation: skipped (no core source changes)" >> "$GITHUB_STEP_SUMMARY"

  mutation-weekly:
    name: weekly mutation scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ubuntu-latest-cargo-mutation-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-latest-cargo-mutation-

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-mutants
        run: cargo binstall cargo-mutants --no-confirm

      - name: Run full workspace mutation scan
        run: cargo mutants -p tankyu-core 2>&1 | tee mutants_output.txt || true

      - name: Report results and file issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY=$(grep -E "[0-9]+ mutants tested" mutants_output.txt | tail -1 \
            || echo "No summary found")
          MISSED_LINES=$(grep "MISSED" mutants_output.txt || true)
          MISSED_COUNT=$(echo "$SUMMARY" | grep -oE '[0-9]+ missed' \
            | grep -oE '[0-9]+' || echo 0)

          {
            echo "## Weekly Mutation Scan"
            echo ""
            echo "$SUMMARY"
            if [ -n "$MISSED_LINES" ]; then
              echo ""
              echo "### Surviving Mutants (${MISSED_COUNT})"
              echo '```'
              echo "$MISSED_LINES"
              echo '```'
            else
              echo ""
              echo ":white_check_mark: No surviving mutants."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Ensure label exists (idempotent)
          gh label create "mutation-survivors" \
            --color "d93f0b" \
            --description "Surviving mutants from weekly mutation scan" \
            2>/dev/null || true

          EXISTING=$(gh issue list \
            --label "mutation-survivors" \
            --state open \
            --json number \
            --jq '.[0].number' || echo "")

          SCAN_DATE=$(date -u +%Y-%m-%d)

          if [ -n "$MISSED_LINES" ]; then
            BODY="## Weekly Mutation Scan -- ${SCAN_DATE}

**Summary:** ${SUMMARY}

### Surviving Mutants (${MISSED_COUNT})

\`\`\`
${MISSED_LINES}
\`\`\`

Reproduce locally:

\`\`\`bash
cargo mutants -p tankyu-core
\`\`\`

Kill each survivor by adding a targeted test that exercises the changed logic.

_Auto-generated by the weekly mutation scan workflow._"

            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" \
                --title "Mutation survivors -- ${SCAN_DATE}" \
                --body "$BODY"
              echo "Updated existing issue #${EXISTING}."
            else
              gh issue create \
                --title "Mutation survivors -- ${SCAN_DATE}" \
                --body "$BODY" \
                --label "mutation-survivors"
            fi
          else
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" \
                --comment "All mutants killed as of ${SCAN_DATE}. Closing."
              echo "Closed issue #${EXISTING} -- no survivors."
            else
              echo "No survivors. Nothing to do."
            fi
          fi
